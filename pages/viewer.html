<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Soccer Book — all pages</title>
<style>
  body { margin: 0; padding: 0; background: #2a2a2a; }
  .book-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #1a1612;
    color: #c9a961;
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    z-index: 100;
    display: flex;
    gap: 12px;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .book-nav button, .book-nav a {
    background: #c9a961;
    color: #1a1612;
    border: none;
    padding: 6px 14px;
    font-size: 11pt;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    text-decoration: none;
  }
  .book-nav button:hover { background: #fde100; }
  .book-nav input {
    padding: 6px 10px;
    font-size: 11pt;
    border: 1px solid #c9a961;
    background: #1a1612;
    color: #c9a961;
    border-radius: 4px;
    width: 60px;
    text-align: center;
  }
  .book-nav .label { font-family: 'Cormorant Garamond', serif; font-size: 16pt; font-style: italic; }
  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
    margin-top: 56px;
    background: white;
  }
  .cover-link {
    background: #1f4d3a;
    color: white;
    padding: 8px 16px;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="book-nav">
  <span class="label">⚽ The Soccer Book</span>
  <input type="number" id="pageInput" min="1" max="100" value="1" onchange="goToPage()">
  <button onclick="prev()">‹ Prev</button>
  <button onclick="next()">Next ›</button>
  <button onclick="random()">🎲 Random</button>
  <a href="01-cover.html" target="_blank">Open Cover ↗</a>
</div>
<iframe id="bookFrame" src="01-cover.html"></iframe>
<script>
let currentPage = 1;
function getPageName(n) {
  const nn = String(n).padStart(2, '0');
  // First three are special
  if (n === 1) return '01-cover.html';
  if (n === 2) return '02-halftitle.html';
  if (n === 3) return '03-contents.html';
  return `${nn}-page.html`;
}
function goToPage() {
  const n = parseInt(document.getElementById('pageInput').value);
  if (n >= 1 && n <= 100) {
    currentPage = n;
    document.getElementById('bookFrame').src = getPageName(n);
  }
}
function prev() {
  currentPage = Math.max(1, currentPage - 1);
  document.getElementById('pageInput').value = currentPage;
  document.getElementById('bookFrame').src = getPageName(currentPage);
}
function next() {
  currentPage = Math.min(100, currentPage + 1);
  document.getElementById('pageInput').value = currentPage;
  document.getElementById('bookFrame').src = getPageName(currentPage);
}
function random() {
  const n = Math.floor(Math.random() * 100) + 1;
  currentPage = n;
  document.getElementById('pageInput').value = n;
  document.getElementById('bookFrame').src = getPageName(n);
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prev();
  else if (e.key === 'ArrowRight') next();
});
</script>
</body>
</html>
